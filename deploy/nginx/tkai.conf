# =============================================================
# VPS ANA Nginx reverse proxy — domain bağlama için
# Kopyalama:
#   sudo cp deploy/nginx/tkai.conf /etc/nginx/sites-available/tkai
#   sudo ln -s /etc/nginx/sites-available/tkai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# "alanadiniz.com" yerine kendi domain'inizi yazın.
# SSL, certbot çalıştıktan sonra otomatik eklenir.
# =============================================================
server {
    listen 80;
    server_name alanadiniz.com www.alanadiniz.com;

    # Frontend (React) -> 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # NOT: /hcgi/api istekleri frontend container'ı (Nginx) tarafından
    # zaten api:5000'e yönlendiriliyor. Docker kullanmıyorsanız aşağıdaki
    # bloğu açın:
    #
    # location /hcgi/api/ {
    #     proxy_pass http://127.0.0.1:5000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }
}
